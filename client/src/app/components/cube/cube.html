<div
  class="cube-wrapper"
  [class.channeling]="isChanneling()"
  [class.idle]="!isChanneling()"
  [class.active]="isActive"
  [class.marker-left]="markerPlacement === 'left'"
  [class.marker-right]="markerPlacement === 'right'"
  [class.marker-below]="markerPlacement === 'below'"
>
  <div class="cube-body">
    @if (markerIcon) {
      <div class="cube-marker" [style.background-position]="markerIcon"></div>
    }
    <div class="cube-anchor">
    <svg class="cube-svg" viewBox="55 35 130 130" xmlns="http://www.w3.org/2000/svg" (click)="onClick()">
      <defs>
        <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7a6a6a"/>
          <stop offset="100%" stop-color="#4a3f3f"/>
        </linearGradient>
        <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#5f5252"/>
          <stop offset="100%" stop-color="#3d3333"/>
        </linearGradient>
        <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#4b4040"/>
          <stop offset="100%" stop-color="#2e2626"/>
        </linearGradient>
        <!-- Channeling gradients -->
        <linearGradient id="topFaceGlow" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6a4aaa"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
        <linearGradient id="leftFaceGlow" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#5a3a9a"/>
          <stop offset="100%" stop-color="#3a1a6a"/>
        </linearGradient>
        <linearGradient id="rightFaceGlow" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7a5ae6"/>
          <stop offset="100%" stop-color="#4a2a8a"/>
        </linearGradient>
      </defs>

      <g stroke="#2a2222" stroke-width="1">
        <!-- Top face base -->
        <g class="face-top">
          <polygon points="120,40 140,50 120,60 100,50"/>
          <polygon points="140,50 160,60 140,70 120,60"/>
          <polygon points="160,60 180,70 160,80 140,70"/>
          <polygon points="100,50 120,60 100,70 80,60"/>
          <polygon points="120,60 140,70 120,80 100,70"/>
          <polygon points="140,70 160,80 140,90 120,80"/>
          <polygon points="80,60 100,70 80,80 60,70"/>
          <polygon points="100,70 120,80 100,90 80,80"/>
          <polygon points="120,80 140,90 120,100 100,90"/>
        </g>

        <!-- Top face circle -->
        <g class="top-circle" pointer-events="none">
          <ellipse cx="120" cy="70" rx="42" ry="21" fill="none" stroke-width="3.5" opacity="0.9"/>
          <ellipse cx="120" cy="70" rx="14" ry="7" opacity="0.8"/>
        </g>

        <!-- Top grid lines -->
        <g fill="none" stroke="#2a2222" stroke-width="1">
          <polygon points="120,40 140,50 120,60 100,50"/>
          <polygon points="140,50 160,60 140,70 120,60"/>
          <polygon points="160,60 180,70 160,80 140,70"/>
          <polygon points="100,50 120,60 100,70 80,60"/>
          <polygon points="120,60 140,70 120,80 100,70"/>
          <polygon points="140,70 160,80 140,90 120,80"/>
          <polygon points="80,60 100,70 80,80 60,70"/>
          <polygon points="100,70 120,80 100,90 80,80"/>
          <polygon points="120,80 140,90 120,100 100,90"/>
        </g>

        <!-- Left face -->
        <g class="face-left-svg">
          <polygon points="60,70 80,80 80,100 60,90"/>
          <polygon points="60,90 80,100 80,120 60,110"/>
          <polygon points="60,110 80,120 80,140 60,130"/>
          <polygon points="80,80 100,90 100,110 80,100"/>
          <polygon points="80,100 100,110 100,130 80,120"/>
          <polygon points="80,120 100,130 100,150 80,140"/>
          <polygon points="100,90 120,100 120,120 100,110"/>
          <polygon points="100,110 120,120 120,140 100,130"/>
          <polygon points="100,130 120,140 120,160 100,150"/>
        </g>

        <!-- Left face runes -->
        <g class="runes" pointer-events="none">
          <!-- Star - top-left -->
          <g transform="matrix(1, 0.5, 0, 1, 70, 85)">
            <polygon points="0,-5 1.2,-1.6 4.8,-1.5 1.9,0.6 2.9,4 0,2 -2.9,4 -1.9,0.6 -4.8,-1.5 -1.2,-1.6" opacity="0.5"/>
          </g>
          <!-- Lightning - bottom-left -->
          <g transform="matrix(1, 0.5, 0, 1, 70, 125)">
            <path d="M2,-6 L-1,-1 L1,0 L-2,6" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
          </g>
          <!-- Lightning - top-center -->
          <g transform="matrix(1, 0.5, 0, 1, 90, 95)">
            <path d="M2,-6 L-1,-1 L1,0 L-2,6" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
          </g>
          <!-- Target circle - bottom-center -->
          <g transform="matrix(1, 0.5, 0, 1, 90, 135)">
            <circle cx="0" cy="0" r="5" fill="none" stroke-width="1.2" opacity="0.6"/>
            <circle cx="0" cy="0" r="1.5" opacity="0.6"/>
          </g>
          <!-- Target circle - top-right -->
          <g transform="matrix(1, 0.5, 0, 1, 110, 105)">
            <circle cx="0" cy="0" r="5" fill="none" stroke-width="1.2" opacity="0.6"/>
            <circle cx="0" cy="0" r="1.5" opacity="0.6"/>
          </g>
          <!-- Sun - mid-right -->
          <g transform="matrix(1, 0.5, 0, 1, 110, 125)">
            <circle cx="0" cy="0" r="3" opacity="0.5"/>
            <g stroke-width="1" opacity="0.5" stroke-linecap="round">
              <line x1="0" y1="-6" x2="0" y2="-4"/>
              <line x1="0" y1="4" x2="0" y2="6"/>
              <line x1="-6" y1="0" x2="-4" y2="0"/>
              <line x1="4" y1="0" x2="6" y2="0"/>
              <line x1="-4" y1="-4" x2="-3" y2="-3"/>
              <line x1="3" y1="3" x2="4" y2="4"/>
              <line x1="4" y1="-4" x2="3" y2="-3"/>
              <line x1="-3" y1="3" x2="-4" y2="4"/>
            </g>
          </g>
        </g>

        <!-- Right face -->
        <g class="face-right-svg">
          <polygon points="180,70 160,80 160,100 180,90"/>
          <polygon points="180,90 160,100 160,120 180,110"/>
          <polygon points="180,110 160,120 160,140 180,130"/>
          <polygon points="160,80 140,90 140,110 160,100"/>
          <polygon points="160,100 140,110 140,130 160,120"/>
          <polygon points="160,120 140,130 140,150 160,140"/>
          <polygon points="140,90 120,100 120,120 140,110"/>
          <polygon points="140,110 120,120 120,140 140,130"/>
          <polygon points="140,130 120,140 120,160 140,150"/>
        </g>

        <!-- Right face runes -->
        <g class="runes" pointer-events="none">
          <!-- Lightning - top-right -->
          <g transform="matrix(1, -0.5, 0, 1, 170, 85)">
            <path d="M2,-6 L-1,-1 L1,0 L-2,6" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
          </g>
          <!-- Sun - top-center -->
          <g transform="matrix(1, -0.5, 0, 1, 150, 95)">
            <circle cx="0" cy="0" r="3" opacity="0.5"/>
            <g stroke-width="1" opacity="0.5" stroke-linecap="round">
              <line x1="0" y1="-6" x2="0" y2="-4"/>
              <line x1="0" y1="4" x2="0" y2="6"/>
              <line x1="-6" y1="0" x2="-4" y2="0"/>
              <line x1="4" y1="0" x2="6" y2="0"/>
              <line x1="-4" y1="-4" x2="-3" y2="-3"/>
              <line x1="3" y1="3" x2="4" y2="4"/>
              <line x1="4" y1="-4" x2="3" y2="-3"/>
              <line x1="-3" y1="3" x2="-4" y2="4"/>
            </g>
          </g>
          <!-- Target circle - mid-left -->
          <g transform="matrix(1, -0.5, 0, 1, 130, 125)">
            <circle cx="0" cy="0" r="5" fill="none" stroke-width="1.2" opacity="0.6"/>
            <circle cx="0" cy="0" r="1.5" opacity="0.6"/>
          </g>
          <!-- Star - bottom-center -->
          <g transform="matrix(1, -0.5, 0, 1, 150, 135)">
            <polygon points="0,-5 1.2,-1.6 4.8,-1.5 1.9,0.6 2.9,4 0,2 -2.9,4 -1.9,0.6 -4.8,-1.5 -1.2,-1.6" opacity="0.5"/>
          </g>
          <!-- Star - bottom-right -->
          <g transform="matrix(1, -0.5, 0, 1, 170, 125)">
            <polygon points="0,-5 1.2,-1.6 4.8,-1.5 1.9,0.6 2.9,4 0,2 -2.9,4 -1.9,0.6 -4.8,-1.5 -1.2,-1.6" opacity="0.5"/>
          </g>
        </g>
      </g>
    </svg>
    @if (isChanneling()) {
      <span class="channeler-name">{{ channelerName() }}</span>
    }
    </div>
  </div>
</div>
